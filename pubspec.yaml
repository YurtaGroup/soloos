name: solo_os
description: Solo OS - Operating System for Solopreneurs
publish_to: 'none'
version: 1.0.0+7

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP & API
  http: ^1.2.0

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.4

  # Backend
  flutter_dotenv: ^5.2.1

  # State Management
  provider: ^6.1.2

  # Utils
  intl: ^0.20.2
  uuid: ^4.4.0

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Share
  share_plus: ^10.1.4

  # Speech-to-text
  speech_to_text: ^7.0.0

  # In-App Purchases
  purchases_flutter: ^8.1.0

  # Biometric auth
  local_auth: ^2.3.0

  # Calendar UI
  table_calendar: ^3.1.3

  # Google Calendar & Contacts
  google_sign_in: ^6.2.0
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#7C3AED"
  adaptive_icon_foreground: "assets/icon/app_icon_android.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - assets/icon/
